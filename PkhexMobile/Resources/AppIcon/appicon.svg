<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- PkhexMobile app icon — full composited icon (background + Poké Ball glyph), used
     directly on platforms without adaptive-icon layering. The Poké Ball is
     Nintendo/Creatures Inc./GAME FREAK Inc. imagery; this is an unofficial fan project
     with no affiliation implied (see README). -->
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="topHalf">
      <rect x="0" y="0" width="512" height="256" />
    </clipPath>
  </defs>
  <rect x="0" y="0" width="512" height="512" fill="#F6F8FB" />
  <circle cx="256" cy="256" r="212" fill="#FFFFFF" />
  <circle cx="256" cy="256" r="212" fill="#E5484D" clip-path="url(#topHalf)" />
  <rect x="44" y="240" width="424" height="32" fill="#141A23" />
  <circle cx="256" cy="256" r="56" fill="#141A23" />
  <circle cx="256" cy="256" r="38" fill="#FFFFFF" />
  <circle cx="256" cy="256" r="212" fill="none" stroke="#141A23" stroke-width="14" />
</svg>
