<!-- @dsCard group="Pkhex Mobile" viewport="440x820" name="PkhexMobile — Party & Detail" subtitle="Interactive: tap a party member to open its detail" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>PkhexMobile</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html,body{margin:0;height:100%}
  body{background:var(--bg-app-elevated);font-family:var(--font-body);display:flex;align-items:center;justify-content:center;padding:20px}
  .phone{width:390px;height:800px;background:var(--surface-card);border-radius:44px;box-shadow:var(--shadow-overlay);border:1px solid var(--border-subtle);position:relative;overflow:hidden}
  .phone .notch{position:absolute;top:11px;left:50%;transform:translateX(-50%);width:110px;height:26px;background:var(--slate-950);border-radius:999px;z-index:20}
  .screen{position:absolute;inset:0;border-radius:44px;overflow:hidden}
</style>
</head><body>
<div class="phone"><div class="notch"></div><div class="screen" id="root"></div></div>
<script src="./data.js"></script>
<script type="text/babel" src="./icons.jsx.txt"></script>
<script type="text/babel" src="./chrome.jsx.txt"></script>
<script type="text/babel" src="./PartyListScreen.jsx.txt"></script>
<script type="text/babel" src="./DetailScreen.jsx.txt"></script>
<script type="text/babel">
function App(){
  const [view,setView]=React.useState('party');
  return view==='detail'
    ? <window.DetailScreen onBack={()=>setView('party')} />
    : <window.PartyListScreen onOpen={()=>setView('detail')} onNav={()=>{}} />;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body></html>
